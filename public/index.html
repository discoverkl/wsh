<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bash</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e1e2e'/><text x='4' y='24' font-family='monospace' font-size='18' font-weight='bold' fill='%23a6e3a1'>&#x3e;_</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&family=Fira+Code:wght@300;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #desktop {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7f849c 0%, #6c7086 100%);
    }

    #window {
      width: 86vw;
      height: 84vh;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(205, 214, 244, 0.08),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 32px 80px rgba(0, 0, 0, 0.7);
    }

    #titlebar {
      height: 38px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 14px;
      position: relative;
      background: #181825;
      border-bottom: 1px solid rgba(205, 214, 244, 0.07);
      -webkit-app-region: drag;
      user-select: none;
    }

    #controls {
      display: flex;
      gap: 8px;
      align-items: center;
      -webkit-app-region: no-drag;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .dot:hover { filter: brightness(1.2); }
    .dot.close    { background: #ff5f57; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2); }
    .dot.minimize { background: #febc2e; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2); }
    .dot.maximize { background: #28c840; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2); }

    #window-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: #6c7086;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    #new-session {
      margin-left: auto;
      background: none;
      border: none;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #45475a;
      font-size: 18px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      -webkit-app-region: no-drag;
    }
    #new-session:hover {
      color: #cdd6f4;
      background: rgba(205, 214, 244, 0.07);
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      background: #1e1e2e;
      padding: 4px 6px;
    }

    /* tighten xterm padding */
    .xterm-screen { padding: 0; }

    :fullscreen #desktop {
      background: #1e1e2e;
    }
    :fullscreen #window {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }
    :fullscreen #titlebar {
      display: none;
    }
  </style>
</head>
<body>
  <div id="desktop">
    <div id="window">
      <div id="titlebar">
        <div id="controls">
          <span class="dot close" title="Close"></span>
          <span class="dot minimize" title="Minimize"></span>
          <span class="dot maximize" title="Full Screen"></span>
        </div>
        <span id="window-title">bash</span>
        <button id="new-session" title="New Session">+</button>
      </div>
      <div id="terminal-container"></div>
    </div>
  </div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.style.overflow = 'auto';
      document.body.innerHTML = '<pre style="color:#f44;padding:20px;font-size:14px">'
        + 'JS ERROR: ' + msg + '\n' + src + ':' + line + ':' + col
        + (err ? '\n' + err.stack : '') + '</pre>';
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script type="module" src="/client.js"></script>
</body>
</html>

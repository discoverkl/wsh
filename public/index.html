<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1e1e1e;
    }
    #terminal-container {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="terminal-container"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.style.overflow = 'auto';
      document.body.innerHTML = '<pre style="color:#f44;padding:20px;font-size:14px">'
        + 'JS ERROR: ' + msg + '\n' + src + ':' + line + ':' + col
        + (err ? '\n' + err.stack : '') + '</pre>';
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script type="module" src="/client.js"></script>
</body>
</html>

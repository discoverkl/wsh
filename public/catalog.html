<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page: #1a1a22;
  --bg-card: #242430;
  --bg-card-hover: #2c2c3a;
  --border: #333342;
  --border-hover: #44445a;
  --text-primary: #ededf2;
  --text-secondary: #9c9cb2;
  --text-tertiary: #6a6a80;
  --accent: #6366f1;
  --icon-bg: #2e2e3e;
  --icon-color: #a8a8be;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-page);
  background-image: radial-gradient(ellipse at 50% 0%, #22222e 0%, var(--bg-page) 70%);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 24px;
}

header {
  padding: 36px 0 28px;
  text-align: center;
}

.wordmark {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  margin-top: 6px;
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 400;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding-bottom: 64px;
}
.grid[hidden] { display: none; }

.card {
  display: block;
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(8px);
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, opacity 0.35s ease-out, transform 0.35s ease-out;
}

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  background: var(--bg-card-hover);
}

.card:hover .card-icon {
  box-shadow: 0 0 20px var(--card-glow, rgba(99, 102, 241, 0.15));
}

.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--icon-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: box-shadow 0.3s;
}

.card-icon svg {
  width: 24px;
  height: 24px;
}

.card-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  min-width: 0;
}

.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.card-sessions {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  white-space: nowrap;
  color: var(--text-tertiary);
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
}

.card-sessions.active {
  opacity: 1;
  color: var(--text-secondary);
}

.card-sessions .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.card-desc {
  font-size: 15px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  margin-top: 14px;
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.card-type-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  color: #3b82f6;
  background: rgba(59, 130, 246, 0.12);
  border: 1px solid rgba(59, 130, 246, 0.2);
  vertical-align: middle;
}

.card-badge-public {
  color: #22c55e;
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.2);
}

/* Config popover */
.config-gear {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, background 0.2s, color 0.2s;
  z-index: 2;
}
.card:hover .config-gear,
.skill-card:hover .config-gear {
  opacity: 1;
}
.config-gear:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-secondary);
}
.config-gear svg {
  width: 16px;
  height: 16px;
}
.config-popover {
  display: none;
  position: absolute;
  top: 42px;
  right: 12px;
  z-index: 10;
  background: var(--bg-card-hover);
  border: 1px solid var(--border-hover);
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 240px;
  max-width: 340px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}
.config-popover.open { display: block; }
.config-row {
  display: flex;
  gap: 8px;
  font-size: 12px;
  line-height: 1.6;
}
.config-row + .config-row { margin-top: 6px; }
.config-label {
  color: var(--text-tertiary);
  flex-shrink: 0;
  min-width: 60px;
  text-align: right;
}
.config-value {
  color: var(--text-secondary);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  word-break: break-all;
}

/* Skeleton loading */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.skeleton-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--icon-bg);
  margin-bottom: 16px;
}

.skeleton-line {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--icon-bg) 25%, #252535 50%, var(--icon-bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

.skeleton-line.title { width: 60%; height: 16px; margin-bottom: 10px; }
.skeleton-line.desc { width: 85%; margin-bottom: 6px; }
.skeleton-line.desc2 { width: 65%; }

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Section labels */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  margin-bottom: 16px;
  padding-left: 4px;
}

/* Skills grid — 2 columns on desktop, 1 on mobile */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
  gap: 16px;
  padding-bottom: 40px;
}

/* Skill card — purple-tinted border, no link behavior */
.skill-card {
  background: var(--bg-card);
  border: 1px solid rgba(167, 139, 250, 0.15);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(8px);
}
.skill-card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s,
              opacity 0.35s ease-out, transform 0.35s ease-out;
}
.skill-card:hover {
  border-color: rgba(167, 139, 250, 0.35);
  box-shadow: 0 0 30px rgba(167, 139, 250, 0.06);
}

/* Skill card header — icon + title + desc */
.skill-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.skill-info { min-width: 0; }
.skill-info .card-title { font-size: 16px; }
.skill-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Inline input form */
.skill-form {
  display: flex;
  flex-direction: column;
}
.skill-input {
  flex: 1;
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  overflow: hidden;
  min-height: 40px;
  max-height: 320px;
  line-height: 1.5;
  field-sizing: content;
}
.skill-input:focus {
  border-color: rgba(167, 139, 250, 0.5);
  box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.08);
}
.skill-input::placeholder {
  color: var(--text-tertiary);
}
.skill-input::-webkit-scrollbar {
  width: 6px;
}
.skill-input::-webkit-scrollbar-track {
  background: transparent;
}
.skill-input::-webkit-scrollbar-thumb {
  background: var(--border-hover);
  border-radius: 3px;
}
.skill-input::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}
.skill-input {
  scrollbar-width: thin;
  scrollbar-color: var(--border-hover) transparent;
}
.skill-form-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}
.skill-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity 0.2s;
  user-select: none;
}
.skill-hint kbd {
  display: inline-block;
  padding: 1px 5px;
  font-size: 10px;
  font-family: inherit;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
}
.skill-input:focus ~ .skill-form-footer .skill-hint,
.skill-card:hover .skill-hint {
  opacity: 1;
}
.skill-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.skill-submit {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.skill-card:hover .skill-submit {
  background: rgba(167, 139, 250, 0.12);
  border-color: rgba(167, 139, 250, 0.3);
  color: #a78bfa;
}

/* Error / Empty */
.message {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-secondary);
  font-size: 15px;
}

.message.error { color: #ef4444; }

@media (max-width: 640px) {
  header { padding: 28px 0 20px; }
  .grid { gap: 12px; }
  .skills-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="wordmark">{{title}}</div>
    <div class="tagline">{{tagline}}</div>
  </header>
  <div id="skills-section" hidden>
    <div class="section-label">Skills</div>
    <div id="skills-content" class="skills-grid"></div>
  </div>
  <div id="apps-section" hidden>
    <div class="section-label">Apps</div>
    <div id="apps-content" class="grid"></div>
  </div>
  <div id="loading-content" class="grid">
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
  </div>
</div>
<script>
(function() {
  // Accent colors per icon category
  var iconColors = {
    terminal: '#22c55e',
    python: '#eab308',
    node: '#22c55e',
    vim: '#22c55e',
    monitor: '#3b82f6',
    docker: '#3b82f6',
    git: '#f97316',
    ruby: '#ef4444',
    ai: '#a78bfa',
    database: '#06b6d4',
    network: '#3b82f6',
    default: '#8e8ea0'
  };

  // Built-in SVG icons
  var icons = {
    terminal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
    python: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c-1.7 0-3 .5-3.8 1.2C7.5 3.9 7 4.8 7 6v2h5v1H6c-1.7 0-3.2 1.3-3.5 3.2-.4 2.2-.4 3.6 0 5.6C2.8 19.7 3.8 21 5.5 21H7v-2.5c0-1.9 1.6-3.5 3.5-3.5h5c1.4 0 2.5-1.1 2.5-2.5V6c0-1.4-1.3-2.6-2.7-3.2C14.5 2.3 13.3 2 12 2zM9.5 4a1 1 0 110 2 1 1 0 010-2z"/><path d="M12 22c1.7 0 3-.5 3.8-1.2.7-.7 1.2-1.6 1.2-2.8v-2h-5v-1h6c1.7 0 3.2-1.3 3.5-3.2.4-2.2.4-3.6 0-5.6C21.2 4.3 20.2 3 18.5 3H17v2.5c0 1.9-1.6 3.5-3.5 3.5h-5C7.1 9 6 10.1 6 11.5V18c0 1.4 1.3 2.6 2.7 3.2 1.1.5 2.1.8 3.3.8zM14.5 20a1 1 0 110-2 1 1 0 010 2z"/></svg>',
    node: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/><path d="M12 7v10"/><path d="M7 9.5l5 3 5-3"/></svg>',
    vim: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 17 12 3 21 17"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="16" r="0.5"/></svg>',
    monitor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
    docker: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11c.6-.4 1-1.1.7-2-.4-1-1.7-1.5-2.7-1.2"/><rect x="2" y="10" width="4" height="4" rx="0.5"/><rect x="7" y="10" width="4" height="4" rx="0.5"/><rect x="12" y="10" width="4" height="4" rx="0.5"/><rect x="7" y="5.5" width="4" height="4" rx="0.5"/><rect x="12" y="5.5" width="4" height="4" rx="0.5"/><rect x="12" y="1" width="4" height="4" rx="0.5"/><path d="M1 14c1 4 4.5 7 9.5 7 6 0 10-4 11.5-8"/></svg>',
    git: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 009 9"/></svg>',
    ruby: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 8 5 20 19 20 22 8"/><line x1="12" y1="2" x2="12" y2="20"/><line x1="2" y1="8" x2="22" y2="8"/></svg>',
    ai: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 014 4v1h1a4 4 0 014 4v0a4 4 0 01-2.5 3.7L18 15l.5 5H5.5L6 15l-.5-.3A4 4 0 013 11v0a4 4 0 014-4h1V6a4 4 0 014-4z"/><circle cx="9" cy="11" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="11" r="1.5" fill="currentColor" stroke="none"/></svg>',
    database: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',
    network: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>',
    default: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg>'
  };

  // Icon alias table: app key or command basename -> icon ID
  var iconAliases = {
    bash: 'terminal', zsh: 'terminal', sh: 'terminal', fish: 'terminal',
    python: 'python', python3: 'python',
    node: 'node', nodejs: 'node',
    vim: 'vim', nvim: 'vim', neovim: 'vim',
    htop: 'monitor', btop: 'monitor', top: 'monitor',
    docker: 'docker',
    git: 'git',
    ruby: 'ruby', irb: 'ruby',
    claude: 'ai', chatgpt: 'ai', ollama: 'ai', aider: 'ai',
    mysql: 'database', psql: 'database', 'redis-cli': 'database', sqlite3: 'database',
    ssh: 'network', curl: 'network', wget: 'network'
  };

  // Auto-generated descriptions for well-known apps
  var defaultDescriptions = {
    bash: 'Bourne Again Shell',
    zsh: 'Z Shell',
    sh: 'POSIX Shell',
    fish: 'Friendly Interactive Shell',
    python: 'Python REPL',
    python3: 'Python 3 REPL',
    node: 'Node.js REPL',
    nodejs: 'Node.js REPL',
    vim: 'Vi IMproved text editor',
    nvim: 'Neovim text editor',
    neovim: 'Neovim text editor',
    htop: 'Interactive process viewer',
    btop: 'Resource monitor',
    top: 'Process monitor',
    docker: 'Container runtime',
    git: 'Version control',
    ruby: 'Ruby REPL',
    irb: 'Interactive Ruby',
    claude: 'AI coding assistant',
    chatgpt: 'AI assistant',
    ollama: 'Local AI models',
    aider: 'AI pair programming',
    mysql: 'MySQL client',
    psql: 'PostgreSQL client',
    'redis-cli': 'Redis client',
    sqlite3: 'SQLite console',
    ssh: 'Secure Shell',
    curl: 'HTTP client',
    wget: 'File downloader'
  };

  function resolveIconId(app) {
    if (app.icon && icons[app.icon]) return app.icon;
    if (iconAliases[app.key]) return iconAliases[app.key];
    var basename = app.command.split('/').pop();
    if (iconAliases[basename]) return iconAliases[basename];
    return 'default';
  }

  function resolveDescription(app) {
    if (app.description) return app.description;
    if (defaultDescriptions[app.key]) return defaultDescriptions[app.key];
    var basename = app.command.split('/').pop();
    if (defaultDescriptions[basename]) return defaultDescriptions[basename];
    return app.command;
  }

  function renderSkills(skills) {
    var section = document.getElementById('skills-section');
    var content = document.getElementById('skills-content');
    content.innerHTML = '';
    skills.forEach(function(app, i) {
      var iconId = resolveIconId(app);
      var color = iconColors[iconId] || iconColors.default;
      var div = document.createElement('div');
      div.className = 'skill-card';
      div.dataset.app = app.key;
      div.innerHTML =
        buildConfigPopover(app) +
        '<div class="skill-header">' +
          '<div class="card-icon" style="color:#a78bfa">' + icons[iconId] + '</div>' +
          '<div class="skill-info">' +
            '<span class="card-title">' + escapeHtml(app.title) + '</span>' +
            '<div class="skill-desc">' + escapeHtml(resolveDescription(app)) + '</div>' +
          '</div>' +
          '<span class="card-sessions" data-app="' + escapeAttr(app.key) + '"></span>' +
        '</div>' +
        '<form class="skill-form" data-app="' + escapeAttr(app.key) + '">' +
          '<textarea class="skill-input" rows="1" placeholder="Describe your task..."></textarea>' +
          '<div class="skill-form-footer">' +
            '<span class="skill-hint"><kbd>' + (navigator.platform.indexOf('Mac') > -1 ? '\u2318' : 'Ctrl') + '</kbd> + <kbd>Enter</kbd> to run</span>' +
            '<button type="submit" class="skill-submit">Run</button>' +
          '</div>' +
        '</form>';
      content.appendChild(div);
      setTimeout(function() { div.classList.add('visible'); }, 30 * i);
    });
    section.hidden = false;
  }

  function renderApps(apps) {
    var content = document.getElementById('apps-content');
    content.innerHTML = '';
    apps.forEach(function(app, i) {
      var iconId = resolveIconId(app);
      var color = iconColors[iconId] || iconColors.default;
      var a = document.createElement('a');
      a.href = './' + app.key;
      a.className = 'card';
      a.target = '_blank';
      a.dataset.app = app.key;
      var r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
      a.style.setProperty('--card-glow', 'rgba(' + r + ',' + g + ',' + b + ',0.2)');
      a.innerHTML =
        buildConfigPopover(app) +
        '<div class="card-header">' +
          '<div class="card-icon" style="color:' + color + '">' + icons[iconId] + '</div>' +
          '<div class="card-title-row">' +
            '<span class="card-title">' + escapeHtml(app.title) + '</span>' +
            (app.type === 'web' ? '<span class="card-type-badge">WEB</span>' : '') +
            (app.access === 'public' ? '<span class="card-type-badge card-badge-public">PUBLIC</span>' : '') +
            '<span class="card-sessions" data-app="' + escapeAttr(app.key) + '"></span>' +
          '</div>' +
        '</div>' +
        '<div class="card-desc">' + escapeHtml(resolveDescription(app)) + '</div>' +
        '<div class="card-footer">' + escapeHtml(app.key) + '</div>';
      content.appendChild(a);
      setTimeout(function() { a.classList.add('visible'); }, 30 * i);
    });
    document.getElementById('apps-section').hidden = false;
  }

  function renderCards(allApps) {
    document.getElementById('loading-content').hidden = true;
    if (allApps.length === 0) {
      var appsSection = document.getElementById('apps-section');
      appsSection.hidden = false;
      document.getElementById('apps-content').innerHTML = '<div class="message">No apps configured</div>';
      appsSection.querySelector('.section-label').style.display = 'none';
      return;
    }
    var skills = allApps.filter(function(a) { return !!a.skill; });
    var apps = allApps.filter(function(a) { return !a.skill; });
    if (skills.length) { renderSkills(skills); restoreDrafts(); }
    if (apps.length) renderApps(apps);
    // Hide section labels when only one type exists
    if (!skills.length) {
      var label = document.querySelector('#apps-section .section-label');
      if (label) label.style.display = 'none';
    }

    // Async: fetch active sessions and update badges
    fetchSessions();
  }

  function fetchSessions() {
    fetch('./api/sessions')
      .then(function(res) { return res.ok ? res.json() : null; })
      .then(function(data) {
        if (!data || !data.sessions) return;
        // Count sessions per app
        var counts = {};
        data.sessions.forEach(function(s) {
          var app = s.app || 'bash';
          counts[app] = (counts[app] || 0) + 1;
        });
        // Update badges
        var badges = document.querySelectorAll('.card-sessions[data-app]');
        for (var i = 0; i < badges.length; i++) {
          var badge = badges[i];
          var appKey = badge.getAttribute('data-app');
          var count = counts[appKey];
          if (count) {
            badge.innerHTML = '<span class="dot"></span>' + count + ' active';
            badge.classList.add('active');
          }
        }
      })
      .catch(function() {}); // silently ignore — sessions are non-critical
  }

  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function escapeAttr(s) {
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  var gearSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';

  function buildConfigPopover(app) {
    var rows = [];
    if (app.command) rows.push({ label: 'command', value: app.command });
    if (app.skill) rows.push({ label: 'skill', value: app.skill });
    rows.push({ label: 'type', value: app.type || 'pty' });
    if (app.access) rows.push({ label: 'access', value: app.access });
    if (app.icon) rows.push({ label: 'icon', value: app.icon });
    var html = '';
    rows.forEach(function(r) {
      html += '<div class="config-row"><span class="config-label">' + escapeHtml(r.label) + '</span><span class="config-value">' + escapeHtml(r.value) + '</span></div>';
    });
    return '<button class="config-gear" data-config-toggle>' + gearSvg + '</button>' +
           '<div class="config-popover">' + html + '</div>';
  }

  function showError(msg) {
    document.getElementById('loading-content').hidden = true;
    var appsSection = document.getElementById('apps-section');
    appsSection.hidden = false;
    appsSection.querySelector('.section-label').style.display = 'none';
    document.getElementById('apps-content').innerHTML = '<div class="message error">' + escapeHtml(msg) + '</div>';
  }

  fetch('./api/apps')
    .then(function(res) {
      if (res.status === 401) throw new Error('Authentication required');
      if (!res.ok) throw new Error('Failed to load apps (HTTP ' + res.status + ')');
      return res.json();
    })
    .then(function(data) {
      renderCards(data.apps || []);
    })
    .catch(function(err) {
      showError(err.message);
    });

  // Config popover toggle
  document.addEventListener('click', function(e) {
    var toggle = e.target.closest('[data-config-toggle]');
    if (toggle) {
      e.preventDefault();
      e.stopPropagation();
      var popover = toggle.nextElementSibling;
      var wasOpen = popover.classList.contains('open');
      // Close all open popovers
      document.querySelectorAll('.config-popover.open').forEach(function(p) { p.classList.remove('open'); });
      if (!wasOpen) popover.classList.add('open');
      return;
    }
    // Click outside closes all
    if (!e.target.closest('.config-popover')) {
      document.querySelectorAll('.config-popover.open').forEach(function(p) { p.classList.remove('open'); });
    }
  });

  // Draft persistence helpers
  var DRAFT_PREFIX = 'wsh-skill-draft:';
  function saveDraft(appKey, value) {
    try { if (value) localStorage.setItem(DRAFT_PREFIX + appKey, value); else localStorage.removeItem(DRAFT_PREFIX + appKey); } catch {}
  }
  function loadDraft(appKey) {
    try { return localStorage.getItem(DRAFT_PREFIX + appKey) || ''; } catch { return ''; }
  }

  // Restore drafts after skills render
  function restoreDrafts() {
    var inputs = document.querySelectorAll('.skill-form[data-app] .skill-input');
    for (var i = 0; i < inputs.length; i++) {
      var appKey = inputs[i].closest('.skill-form').dataset.app;
      var draft = loadDraft(appKey);
      if (draft) {
        inputs[i].value = draft;
        inputs[i].style.height = 'auto';
        inputs[i].style.height = Math.min(inputs[i].scrollHeight, 200) + 'px';
        inputs[i].style.overflow = inputs[i].scrollHeight > 200 ? 'auto' : 'hidden';
      }
    }
  }

  // Auto-resize textareas, save drafts & Cmd/Ctrl+Enter to submit
  document.getElementById('skills-content').addEventListener('input', function(e) {
    var ta = e.target;
    if (!ta.classList.contains('skill-input')) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 320) + 'px';
    ta.style.overflow = ta.scrollHeight > 320 ? 'auto' : 'hidden';
    var appKey = ta.closest('.skill-form').dataset.app;
    saveDraft(appKey, ta.value);
  });
  document.getElementById('skills-content').addEventListener('click', function(e) {
    if (e.target.closest('button') || e.target.closest('.config-popover') || e.target.classList.contains('skill-input')) return;
    var card = e.target.closest('.skill-card');
    if (!card) return;
    var ta = card.querySelector('.skill-input');
    if (ta && !ta.disabled) ta.focus();
  });

  var lastEscTime = 0;
  document.getElementById('skills-content').addEventListener('keydown', function(e) {
    if (!e.target.classList.contains('skill-input')) return;
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      var form = e.target.closest('form');
      if (form) form.requestSubmit();
    }
    if (e.key === 'Escape') {
      var now = Date.now();
      if (now - lastEscTime < 500) {
        e.target.value = '';
        e.target.style.height = 'auto';
        var appKey = e.target.closest('.skill-form').dataset.app;
        saveDraft(appKey, '');
      }
      lastEscTime = now;
    }
  });

  document.getElementById('skills-content').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = e.target;
    if (!form.classList.contains('skill-form')) return;
    var appKey = form.dataset.app;
    var ta = form.querySelector('.skill-input');
    var input = ta.value.trim();
    var btn = form.querySelector('.skill-submit');
    btn.textContent = 'Starting...';
    btn.disabled = true;
    ta.disabled = true;

    fetch('./api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: appKey, input: input })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      btn.textContent = 'Run';
      btn.disabled = false;
      ta.disabled = false;
      ta.value = '';
      ta.style.height = 'auto';
      saveDraft(appKey, '');
      if (data.url) {
        try { var u = new URL(data.url); window.open(u.pathname + u.hash, '_blank'); }
        catch(e) { window.open(data.url, '_blank'); }
      }
      else if (data.error) showError(data.error);
    })
    .catch(function(err) {
      btn.textContent = 'Run';
      btn.disabled = false;
      ta.disabled = false;
      showError('Failed to launch: ' + err.message);
    });
  });
})();
</script>
</body>
</html>

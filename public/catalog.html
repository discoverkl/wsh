<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e1e2e'/><text x='4' y='24' font-family='monospace' font-size='18' font-weight='bold' fill='%23a6e3a1'>&#x3e;_</text></svg>" />
<script type="module" src="mini-terminal.js"></script>
<script src="swipe-cards.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page: #1a1a22;
  --bg-card: #242430;
  --bg-card-hover: #2c2c3a;
  --border: #333342;
  --border-hover: #44445a;
  --text-primary: #ededf2;
  --text-secondary: #9c9cb2;
  --text-tertiary: #6a6a80;
  --accent: #6366f1;
  --icon-bg: #2e2e3e;
  --icon-color: #a8a8be;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-page);
  background-image: radial-gradient(ellipse at 50% 0%, #22222e 0%, var(--bg-page) 70%);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 24px;
}

header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px 0;
}

.header-left {
  flex-shrink: 0;
}

.wordmark {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  margin-top: 2px;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
}

.header-right {
  flex-shrink: 0;
  text-align: right;
}

.header-counts {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.header-counts:empty {
  display: none;
}

.header-sessions {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-top: 2px;
}

.header-sessions:empty {
  display: none;
}

.header-sessions .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  margin-right: 4px;
  vertical-align: middle;
  animation: pulse-dot 2s ease-in-out infinite;
}

.search-wrapper {
  position: relative;
  flex: 1;
  max-width: 400px;
}

.search-wrapper svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-tertiary);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-primary);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-input::placeholder {
  color: var(--text-tertiary);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}

.card.hidden-app,
.skill-card.hidden-app {
  opacity: 0.55;
  border-style: dashed;
}

.card.hidden-app:hover,
.skill-card.hidden-app:hover {
  opacity: 0.85;
}

.hidden-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text-tertiary);
  background: rgba(106, 106, 128, 0.12);
  border: 1px solid rgba(106, 106, 128, 0.2);
  vertical-align: middle;
}

.unhide-btn {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  vertical-align: middle;
}

.unhide-btn:hover {
  background: rgba(99, 102, 241, 0.12);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding-bottom: 64px;
}
.grid[hidden] { display: none; }

.card {
  display: block;
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(8px);
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, opacity 0.35s ease-out, transform 0.35s ease-out;
}

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  background: var(--bg-card-hover);
}

.card:hover .card-icon {
  box-shadow: 0 0 20px var(--card-glow, rgba(99, 102, 241, 0.15));
}

.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--icon-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: box-shadow 0.3s;
}

.card-icon svg {
  width: 24px;
  height: 24px;
}

.card-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  min-width: 0;
}

.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.card-sessions {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  white-space: nowrap;
  color: var(--text-tertiary);
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
}

.card-sessions.active {
  opacity: 1;
  color: var(--text-secondary);
}

.card-sessions .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.card-desc {
  font-size: 15px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  margin-top: 14px;
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.card-type-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  color: #3b82f6;
  background: rgba(59, 130, 246, 0.12);
  border: 1px solid rgba(59, 130, 246, 0.2);
  vertical-align: middle;
}

.card-badge-public {
  color: #22c55e;
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.2);
}

/* Config popover */
.config-gear {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, background 0.2s, color 0.2s;
  z-index: 2;
}
.card:hover .config-gear {
  opacity: 1;
}
.config-gear:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-secondary);
}
.config-gear svg {
  width: 16px;
  height: 16px;
}
.config-popover {
  display: none;
  position: absolute;
  top: 42px;
  right: 12px;
  z-index: 10;
  background: var(--bg-card-hover);
  border: 1px solid var(--border-hover);
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 240px;
  max-width: 340px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}
.config-popover.open { display: block; }
.config-row {
  display: flex;
  gap: 8px;
  font-size: 12px;
  line-height: 1.6;
}
.config-row + .config-row { margin-top: 6px; }
.config-label {
  color: var(--text-tertiary);
  flex-shrink: 0;
  min-width: 60px;
  text-align: right;
}
.config-value {
  color: var(--text-secondary);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  word-break: break-all;
}

/* Skeleton loading */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.skeleton-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--icon-bg);
  margin-bottom: 16px;
}

.skeleton-line {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--icon-bg) 25%, #252535 50%, var(--icon-bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

.skeleton-line.title { width: 60%; height: 16px; margin-bottom: 10px; }
.skeleton-line.desc { width: 85%; margin-bottom: 6px; }
.skeleton-line.desc2 { width: 65%; }

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Section labels */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  margin-bottom: 16px;
  padding-left: 4px;
}

/* Skills grid — 2 columns on desktop, 1 on mobile */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(500px, 100%), 1fr));
  gap: 16px;
  padding-bottom: 40px;
}

/* Skill card — purple-tinted border, no link behavior */
.skill-card {
  background: var(--bg-card);
  border: 1px solid rgba(167, 139, 250, 0.15);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(8px);
}
.skill-card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s,
              opacity 0.35s ease-out, transform 0.35s ease-out;
}
.skill-card:hover {
  border-color: rgba(167, 139, 250, 0.35);
  box-shadow: 0 0 30px rgba(167, 139, 250, 0.06);
}

/* Skill card header — icon + title + desc */
.skill-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.skill-info { min-width: 0; }
.skill-info .card-title { font-size: 16px; }
.skill-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Inline input form */
.skill-form {
  display: flex;
  flex-direction: column;
}
.skill-input-wrap {
  position: relative;
  display: flex;
  align-items: flex-end;
}
.skill-input {
  flex: 1;
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 40px 10px 14px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  overflow: hidden;
  min-height: 40px;
  max-height: 320px;
  line-height: 1.5;
  field-sizing: content;
}
.skill-input:focus {
  border-color: rgba(167, 139, 250, 0.5);
  box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.08);
}
.skill-input::placeholder {
  color: var(--text-tertiary);
}
.skill-input::-webkit-scrollbar {
  width: 6px;
}
.skill-input::-webkit-scrollbar-track {
  background: transparent;
}
.skill-input::-webkit-scrollbar-thumb {
  background: var(--border-hover);
  border-radius: 3px;
}
.skill-input::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}
.skill-input {
  scrollbar-width: thin;
  scrollbar-color: var(--border-hover) transparent;
}
.skill-submit {
  position: absolute;
  right: 6px;
  bottom: 6px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 6px;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  padding: 0;
}
.skill-submit.has-input {
  color: #a78bfa;
}
.skill-submit:hover,
.skill-submit.has-input:hover {
  background: rgba(167, 139, 250, 0.15);
  color: #a78bfa;
}
.skill-submit svg {
  width: 16px;
  height: 16px;
}
.skill-form-footer {
  display: flex;
  align-items: center;
  margin-top: 6px;
}
.skill-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity 0.2s;
  user-select: none;
}
.skill-hint kbd {
  display: inline-block;
  padding: 1px 5px;
  font-size: 10px;
  font-family: inherit;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
}
.skill-hint kbd + kbd {
  margin-left: 2px;
}
.skill-input:focus ~ .skill-submit ~ .skill-form-footer .skill-hint,
.skill-card:hover .skill-hint {
  opacity: 1;
}
.skill-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.skill-inline-wrap {
  margin: 12px -24px -20px;
}
.skill-inline-wrap .mt-bar {
  border-left: none;
  border-right: none;
  border-radius: 0;
}
.skill-inline-wrap .mt-bar.collapsed {
  border-radius: 0 0 12px 12px;
}
.skill-inline-wrap .mt-term {
  border-left: none;
  border-right: none;
  border-bottom: none;
  border-radius: 0 0 12px 12px;
}

/* Error / Empty */
.message {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-secondary);
  font-size: 15px;
}

.message.error { color: #ef4444; }

/* ── Narrow layout (≤640px) ── */
html.narrow header { padding: 14px 0; gap: 0; flex-wrap: wrap; }
html.narrow .header-left { flex: 1; }
html.narrow .tagline { display: none; }
html.narrow .header-right { flex-shrink: 0; }
html.narrow .container { padding: 0 16px; }
html.narrow .grid { gap: 12px; }
html.narrow .skills-grid { grid-template-columns: 1fr; margin: 0 -16px; padding: 0 0 24px; gap: 10px; }
html.narrow .skill-card { border-radius: 0; }
html.narrow .skill-inline-wrap .mt-bar { border-radius: 0; }
html.narrow .skill-inline-wrap .mt-bar.collapsed { border-radius: 0; }
html.narrow .skill-inline-wrap .mt-term { border-radius: 0; }
html.narrow .skill-hint { display: none !important; }
html.narrow .wordmark { font-size: 20px; }
html.narrow .card { padding: 14px 16px; overflow: visible; }
html.narrow .card-title { font-size: 14px; }
html.narrow .card-desc { font-size: 12px; -webkit-line-clamp: 1; margin-top: 2px; }
html.narrow .card-footer { display: none; }
html.narrow .card-icon { width: 36px; height: 36px; border-radius: 8px; }
html.narrow .card-icon svg { width: 18px; height: 18px; }
html.narrow .card-header { gap: 10px; margin-bottom: 4px; }
html.narrow .skill-info .card-title { font-size: 14px; }
html.narrow .skill-desc { font-size: 12px; }
html.narrow .skill-input { font-size: 16px; padding: 10px 44px 10px 14px; }
html.narrow .skill-submit { width: 36px; height: 36px; right: 4px; bottom: 4px; }
html.narrow .skill-submit svg { width: 18px; height: 18px; }
html.narrow .search-input { font-size: 16px; }
html.narrow .section-label { font-size: 10px; }
html.narrow .config-popover { min-width: 0; max-width: none; left: 12px; right: 12px; }
html.narrow .config-gear { display: none; }
html.narrow .unhide-btn { font-size: 13px; padding: 6px 12px; }
html.narrow .search-wrapper {
  order: 3;
  flex-basis: 100%;
  max-width: none;
  margin-top: 10px;
}
html.narrow .search-wrapper svg { left: 12px; }

/* ── Touch interaction ── */
html.touch .config-gear { opacity: 0.5; width: 44px; height: 44px; top: 6px; right: 6px; }
html.touch .card:active { transform: scale(0.98); background: var(--bg-card-hover); transition: none; }
html.touch .skill-card:active { transform: scale(0.99); background: var(--bg-card-hover); transition: none; }

/* ── Narrow + Touch: swipe cards ── */
html.narrow.touch .card-swipe-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}
html.narrow.touch .card-swipe-wrap .card {
  position: relative;
  z-index: 1;
  transition: transform 0.25s ease;
  border-radius: 12px;
}
html.narrow.touch .card-actions {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: stretch;
  z-index: 0;
}
html.narrow.touch .card-action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  border: none;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  flex-direction: column;
  gap: 4px;
}
html.narrow.touch .card-action-btn svg { width: 18px; height: 18px; }
html.narrow.touch .card-action-btn.action-info { background: #333342; color: var(--text-secondary); }
html.narrow.touch .card-action-btn.action-hide { background: #332b1a; color: #f59e0b; }
</style>
</head>
<body>
<script>
(function(){var d=document.documentElement;var tq=matchMedia('(any-pointer:coarse)');if(tq.matches)d.classList.add('touch');tq.addEventListener('change',function(e){d.classList.toggle('touch',e.matches)});if(matchMedia('(max-width:640px)').matches)d.classList.add('narrow');matchMedia('(max-width:640px)').addEventListener('change',function(e){d.classList.toggle('narrow',e.matches)})})();
</script>
<div class="container">
  <header>
    <div class="header-left">
      <div class="wordmark">{{title}}</div>
      <div class="tagline">{{tagline}}</div>
    </div>
    <div class="search-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="catalog-search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    </div>
    <div class="header-right">
      <div class="header-counts" id="header-counts"></div>
      <div class="header-sessions" id="header-sessions"></div>
    </div>
  </header>
  <div id="skills-section" hidden>
    <div class="section-label">Skills</div>
    <div id="skills-content" class="skills-grid"></div>
  </div>
  <div id="apps-section" hidden>
    <div class="section-label">Apps</div>
    <div id="apps-content" class="grid"></div>
  </div>
  <div id="loading-content" class="grid">
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
  </div>
</div>
<script>
(function() {
  // Track active inline terminals per app key
  var inlineTerminals = {};

  // Accent colors per icon category
  var iconColors = {
    terminal: '#22c55e',
    python: '#eab308',
    node: '#22c55e',
    vim: '#22c55e',
    monitor: '#3b82f6',
    docker: '#3b82f6',
    git: '#f97316',
    ruby: '#ef4444',
    ai: '#a78bfa',
    database: '#06b6d4',
    network: '#3b82f6',
    rocket: '#f97316',
    cloud: '#38bdf8',
    lock: '#f59e0b',

    var color = iconColors[iconId] || iconColors.default;
    var div = document.createElement('div');
    div.className = 'skill-card' + (isHidden ? ' hidden-app' : '');
    if (isHidden) div.style.display = 'none';
    div.dataset.app = app.key;
    div.dataset.title = app.title;
    div.dataset.desc = resolveDescription(app);
    if (isHidden) div.dataset.hidden = '1';
    var badges = isHidden
      ? '<span class="hidden-badge">Hidden</span> <button class="unhide-btn" data-unhide="' + escapeAttr(app.key) + '">Unhide</button>'
      : '';
    div.innerHTML =
      '<div class="skill-header">' +
        '<div class="card-icon" style="color:#a78bfa">' + icons[iconId] + '</div>' +
        '<div class="skill-info">' +
          '<span class="card-title">' + escapeHtml(app.title) + '</span> ' + badges +
          '<div class="skill-desc" title="' + escapeAttr(resolveDescription(app)) + '">' + linkify(resolveDescription(app)) + '</div>' +
        '</div>' +
        '<span class="card-sessions" data-app="' + escapeAttr(app.key) + '"></span>' +
      '</div>' +
      '<form class="skill-form" data-app="' + escapeAttr(app.key) + '">' +
        '<div class="skill-input-wrap">' +
          '<textarea class="skill-input" rows="1" placeholder="Describe your task..."></textarea>' +
          '<button type="submit" class="skill-submit" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>' +
        '</div>' +
        '<div class="skill-form-footer">' +
          '<span class="skill-hint"><kbd>Enter</kbd> run · <kbd>' + (navigator.platform.indexOf('Mac') > -1 ? '\u2318' : 'Ctrl') + '</kbd><kbd>Enter</kbd> new tab · <kbd>Esc</kbd> send Esc</span>' +
        '</div>' +
      '</form>' +
      '<div class="skill-inline-wrap"></div>';
    return div;
  }

  function renderSkills(skills, hiddenSkills) {
    var section = document.getElementById('skills-section');
    var content = document.getElementById('skills-content');
    content.innerHTML = '';
    skills.forEach(function(app, i) {
      var div = buildSkillCard(app, false);
      content.appendChild(div);
      setTimeout(function() { div.classList.add('visible'); }, 30 * i);
    });
    (hiddenSkills || []).forEach(function(app, i) {
      var div = buildSkillCard(app, true);
      content.appendChild(div);
      setTimeout(function() { div.classList.add('visible'); }, 30 * (skills.length + i));
    });
    section.hidden = false;
  }

  function buildAppCard(app, isHidden) {
    var iconId = resolveIconId(app);
    var color = iconColors[iconId] || iconColors.default;
    var a = document.createElement('a');
    a.href = './' + app.key;
    a.className = 'card' + (isHidden ? ' hidden-app' : '');
    if (isHidden) a.style.display = 'none';
    a.target = '_blank';
    a.dataset.app = app.key;
    a.dataset.title = app.title;
    a.dataset.desc = resolveDescription(app);
    if (isHidden) a.dataset.hidden = '1';
    var r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
    a.style.setProperty('--card-glow', 'rgba(' + r + ',' + g + ',' + b + ',0.2)');
    var badges = isHidden
      ? '<span class="hidden-badge">Hidden</span> <button class="unhide-btn" data-unhide="' + escapeAttr(app.key) + '" onclick="event.preventDefault();event.stopPropagation()">Unhide</button>'
      : '';
    a.innerHTML =
      buildConfigPopover(app) +
      '<div class="card-header">' +
        '<div class="card-icon" style="color:' + color + '">' + icons[iconId] + '</div>' +
        '<div class="card-title-row">' +
          '<span class="card-title">' + escapeHtml(app.title) + '</span>' +
          (app.type === 'web' ? '<span class="card-type-badge">WEB</span>' : '') +
          (app.access === 'public' ? '<span class="card-type-badge card-badge-public">PUBLIC</span>' : '') +
          badges +
          '<span class="card-sessions" data-app="' + escapeAttr(app.key) + '"></span>' +
        '</div>' +
      '</div>' +
      '<div class="card-desc" title="' + escapeAttr(resolveDescription(app)) + '">' + linkify(resolveDescription(app)) + '</div>' +
      '<div class="card-footer">' + escapeHtml(app.key) + '</div>';
    return a;
  }

  var d = document.documentElement;
  var isMobile = d.classList.contains('narrow') && d.classList.contains('touch');

  function renderApps(apps, hiddenApps) {
    var content = document.getElementById('apps-content');
    content.innerHTML = '';
    apps.forEach(function(app, i) {
      var a = buildAppCard(app, false);
      var el = isMobile ? SwipeCards.wrapCard(a, app, escapeAttr) : a;
      content.appendChild(el);
      setTimeout(function() { a.classList.add('visible'); }, 30 * i);
    });
    (hiddenApps || []).forEach(function(app, i) {
      var a = buildAppCard(app, true);
      var el = isMobile ? SwipeCards.wrapCard(a, app, escapeAttr) : a;
      content.appendChild(el);
      setTimeout(function() { a.classList.add('visible'); }, 30 * (apps.length + i));
    });
    if (isMobile) SwipeCards.init();
    document.getElementById('apps-section').hidden = false;
  }

  function renderCards(allApps) {
    document.getElementById('loading-content').hidden = true;
    if (allApps.length === 0) {
      var appsSection = document.getElementById('apps-section');
      appsSection.hidden = false;
      document.getElementById('apps-content').innerHTML = '<div class="message">No apps configured</div>';
      appsSection.querySelector('.section-label').style.display = 'none';
      return;
    }
    var visibleApps = allApps.filter(function(a) { return !a.hidden; });
    var hiddenApps = allApps.filter(function(a) { return !!a.hidden; });
    var skills = visibleApps.filter(function(a) { return !!a.skill; });
    var apps = visibleApps.filter(function(a) { return !a.skill; });
    var hiddenSkills = hiddenApps.filter(function(a) { return !!a.skill; });
    var hiddenNonSkills = hiddenApps.filter(function(a) { return !a.skill; });
    if (skills.length || hiddenSkills.length) {
      renderSkills(skills, hiddenSkills); restoreDrafts(); reconnectInline();
    }
    if (apps.length || hiddenNonSkills.length) renderApps(apps, hiddenNonSkills);

    // Update header counts
    var countsEl = document.getElementById('header-counts');
    if (countsEl) {
      var parts = [];
      if (apps.length) parts.push(apps.length + (apps.length === 1 ? ' app' : ' apps'));
      if (skills.length) parts.push(skills.length + (skills.length === 1 ? ' skill' : ' skills'));
      countsEl.textContent = parts.join(' \u00b7 ');
    }

    // Hide section labels when only one type exists
    if (!skills.length) {
      var label = document.querySelector('#apps-section .section-label');
      if (label) label.style.display = 'none';
    }

    // Focus search bar
    var searchInput = document.getElementById('catalog-search');
    if (searchInput && !document.documentElement.classList.contains('narrow') && !document.documentElement.classList.contains('touch')) searchInput.focus();

    // Wire up search filtering
    initSearch(allApps);

    // Async: fetch active sessions and update badges
    fetchSessions();
  }

  function initSearch(allApps) {
    var input = document.getElementById('catalog-search');
    if (!input) return;

    function filterCards(selector) {
      var q = input.value.toLowerCase().trim();
      var cards = document.querySelectorAll(selector);
      var visible = 0;
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        // On mobile, app cards are wrapped — check the wrap for hidden/data attrs
        var wrap = card.closest('.card-swipe-wrap');
        var target = wrap || card;
        var isHidden = target.dataset.hidden === '1';
        var title = (target.getAttribute('data-title') || card.getAttribute('data-title') || '').toLowerCase();
        var desc = (target.getAttribute('data-desc') || card.getAttribute('data-desc') || '').toLowerCase();
        var matchesQuery = title.indexOf(q) !== -1 || desc.indexOf(q) !== -1;
        var show = isHidden ? (q && matchesQuery) : (!q || matchesQuery);
        target.style.display = show ? '' : 'none';
        if (show) visible++;
      }
      return visible;
    }

    input.addEventListener('input', function() {
      var skillsVisible = filterCards('.skill-card');
      var appsVisible = filterCards('#apps-content .card');
      var skillsSection = document.getElementById('skills-section');
      var appsSection = document.getElementById('apps-section');
      if (skillsSection && !skillsSection.hidden) {
        skillsSection.style.display = skillsVisible ? '' : 'none';
      }
      if (appsSection && !appsSection.hidden) {
        appsSection.style.display = appsVisible ? '' : 'none';
      }
    });

    // Wire up unhide buttons
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.unhide-btn');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      var appKey = btn.getAttribute('data-unhide');
      btn.textContent = '...';
      fetch('./api/apps/' + encodeURIComponent(appKey) + '/unhide', { method: 'POST' })
        .then(function(res) { return res.json(); })
        .then(function() {
          var card = btn.closest('.card, .skill-card');
          if (card) {
            card.classList.remove('hidden-app');
            delete card.dataset.hidden;
            card.style.borderStyle = '';
            var badge = card.querySelector('.hidden-badge');
            if (badge) badge.remove();
            btn.remove();
          }
        })
        .catch(function() { btn.textContent = 'Unhide'; });
    });
  }

  function fetchSessions() {
    fetch('./api/sessions')
      .then(function(res) { return res.ok ? res.json() : null; })
      .then(function(data) {
        if (!data || !data.sessions) return;
        // Count sessions per app
        var counts = {};
        data.sessions.forEach(function(s) {
          var app = s.app || 'bash';
          counts[app] = (counts[app] || 0) + 1;
        });
        // Update card badges
        var badges = document.querySelectorAll('.card-sessions[data-app]');
        for (var i = 0; i < badges.length; i++) {
          var badge = badges[i];
          var appKey = badge.getAttribute('data-app');
          var count = counts[appKey];
          if (count) {
            badge.innerHTML = '<span class="dot"></span>' + count + ' active';
            badge.classList.add('active');
          }
        }
        // Update header session count
        var total = data.sessions.length;
        var headerSessions = document.getElementById('header-sessions');
        if (headerSessions && total > 0) {
          headerSessions.innerHTML = '<span class="dot"></span>' + total + ' active ' + (total === 1 ? 'session' : 'sessions');
        }
      })
      .catch(function() {}); // silently ignore — sessions are non-critical
  }

  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function escapeAttr(s) {
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  function linkify(text) {
    var safe = escapeHtml(text);
    return safe.replace(/https?:\/\/[^\s<&]+/g, function(url) {
      return '<a href="' + url + '" target="_blank" rel="noopener" tabindex="-1" style="color:inherit;text-decoration:underline;text-decoration-color:var(--border-hover);text-underline-offset:2px" onclick="event.stopPropagation()">' + url + '</a>';
    });
  }

  var gearSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';

  function buildConfigPopover(app) {
    var rows = [];
    if (app.command) rows.push({ label: 'command', value: app.command });
    if (app.skill) rows.push({ label: 'skill', value: app.skill });
    rows.push({ label: 'type', value: app.type || 'pty' });
    if (app.access) rows.push({ label: 'access', value: app.access });
    if (app.icon) rows.push({ label: 'icon', value: app.icon });
    var html = '';
    rows.forEach(function(r) {
      html += '<div class="config-row"><span class="config-label">' + escapeHtml(r.label) + '</span><span class="config-value">' + escapeHtml(r.value) + '</span></div>';
    });
    return '<button class="config-gear" data-config-toggle tabindex="-1">' + gearSvg + '</button>' +
           '<div class="config-popover">' + html + '</div>';
  }

  function showError(msg) {
    document.getElementById('loading-content').hidden = true;
    var appsSection = document.getElementById('apps-section');
    appsSection.hidden = false;
    appsSection.querySelector('.section-label').style.display = 'none';
    document.getElementById('apps-content').innerHTML = '<div class="message error">' + escapeHtml(msg) + '</div>';
  }

  // Reconnect inline terminals from localStorage on page reload
  function reconnectInline() {
    document.querySelectorAll('.skill-card[data-app]').forEach(function(card) {
      var appKey = card.dataset.app;
      var saved = localStorage.getItem('wsh-inline:' + appKey);
      if (!saved) return;
      try {
        var info = JSON.parse(saved);
        var wrap = card.querySelector('.skill-inline-wrap');
        var handle = MiniTerminal.create(wrap, info.id, info.url, true);
        inlineTerminals[appKey] = handle;
      } catch { localStorage.removeItem('wsh-inline:' + appKey); }
    });
  }

  fetch('./api/apps')
    .then(function(res) {
      if (res.status === 401) throw new Error('Authentication required');
      if (!res.ok) throw new Error('Failed to load apps (HTTP ' + res.status + ')');
      return res.json();
    })
    .then(function(data) {
      renderCards(data.apps || []);
    })
    .catch(function(err) {
      showError(err.message);
    });

  // Config popover toggle
  document.addEventListener('click', function(e) {
    var toggle = e.target.closest('[data-config-toggle]');
    if (toggle) {
      e.preventDefault();
      e.stopPropagation();
      var popover = toggle.nextElementSibling;
      var wasOpen = popover.classList.contains('open');
      // Close all open popovers
      document.querySelectorAll('.config-popover.open').forEach(function(p) { p.classList.remove('open'); });
      if (!wasOpen) popover.classList.add('open');
      return;
    }
    // Click outside closes all
    if (!e.target.closest('.config-popover')) {
      document.querySelectorAll('.config-popover.open').forEach(function(p) { p.classList.remove('open'); });
    }
  });

  // Draft persistence helpers
  var DRAFT_PREFIX = 'wsh-skill-draft:';
  function saveDraft(appKey, value) {
    try { if (value) localStorage.setItem(DRAFT_PREFIX + appKey, value); else localStorage.removeItem(DRAFT_PREFIX + appKey); } catch {}
  }
  function loadDraft(appKey) {
    try { return localStorage.getItem(DRAFT_PREFIX + appKey) || ''; } catch { return ''; }
  }

  // Restore drafts after skills render
  function restoreDrafts() {
    var inputs = document.querySelectorAll('.skill-form[data-app] .skill-input');
    for (var i = 0; i < inputs.length; i++) {
      var appKey = inputs[i].closest('.skill-form').dataset.app;
      var draft = loadDraft(appKey);
      if (draft) {
        inputs[i].value = draft;
        inputs[i].style.height = 'auto';
        inputs[i].style.height = Math.min(inputs[i].scrollHeight, 200) + 'px';
        inputs[i].style.overflow = inputs[i].scrollHeight > 200 ? 'auto' : 'hidden';
        var btn = inputs[i].closest('.skill-input-wrap').querySelector('.skill-submit');
        if (btn) btn.classList.add('has-input');
      }
    }
  }

  // Auto-resize textareas, save drafts & Cmd/Ctrl+Enter to submit
  document.getElementById('skills-content').addEventListener('input', function(e) {
    var ta = e.target;
    if (!ta.classList.contains('skill-input')) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 320) + 'px';
    ta.style.overflow = ta.scrollHeight > 320 ? 'auto' : 'hidden';
    var appKey = ta.closest('.skill-form').dataset.app;
    saveDraft(appKey, ta.value);
    var btn = ta.closest('.skill-input-wrap').querySelector('.skill-submit');
    if (btn) btn.classList.toggle('has-input', ta.value.trim().length > 0);
  });
  document.getElementById('skills-content').addEventListener('click', function(e) {
    if (e.target.closest('button') || e.target.closest('.config-popover') || e.target.classList.contains('skill-input') || e.target.closest('a')) return;
    var sel = window.getSelection();
    if (sel && sel.toString().length > 0) return;
    var card = e.target.closest('.skill-card');
    if (!card) return;
    var ta = card.querySelector('.skill-input');
    if (ta && !ta.disabled) ta.focus();
  });

  document.getElementById('skills-content').addEventListener('keydown', function(e) {
    if (!e.target.classList.contains('skill-input')) return;
    if (e.key === 'Enter' && !e.shiftKey && !d.classList.contains('touch')) {
      e.preventDefault();
      var form = e.target.closest('form');
      if (!form) return;
      if (e.metaKey || e.ctrlKey) {
        form.dataset.newTab = '1';
      }
      form.requestSubmit();
    }
    if (e.key === 'Escape') {
      var appKey = e.target.closest('.skill-form').dataset.app;
      var existing = inlineTerminals[appKey];
      if (existing && existing.isAlive()) {
        existing.send('\x1b');
      }
    }
  });

  // Track active inline terminals per app key
  var inlineTerminals = {};

  document.addEventListener('mt-close', function(e) {
    var card = e.target.closest('.skill-card[data-app]');
    if (card) {
      delete inlineTerminals[card.dataset.app];
      localStorage.removeItem('wsh-inline:' + card.dataset.app);
    }
  });

  document.getElementById('skills-content').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = e.target;
    if (!form.classList.contains('skill-form')) return;
    var appKey = form.dataset.app;
    var newTabFlag = form.dataset.newTab === '1';
    delete form.dataset.newTab;
    var ta = form.querySelector('.skill-input');
    var input = ta.value.trim();
    var btn = form.querySelector('.skill-submit');
    var card = form.closest('.skill-card');

    // If there's a live inline session, send input to it instead of creating a new one
    var existing = inlineTerminals[appKey];
    if (existing && existing.isAlive() && !newTabFlag) {
      var raw = input && (input[0] === '/' || input[0] === '?');
      existing.send(raw ? input + '\r' : '/' + appKey + (input ? ' ' + input : '') + '\r');
      ta.value = '';
      ta.style.height = 'auto';
      saveDraft(appKey, '');
      return;
    }

    btn.disabled = true;
    ta.disabled = true;

    var _t0 = performance.now();
    console.log('[Catalog] POST /api/sessions starting');
    fetch('./api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: appKey, input: input, mode: newTabFlag ? '' : 'inline' })
    })
    .then(function(res) { console.log('[Catalog] POST response: +' + (performance.now() - _t0).toFixed(0) + 'ms'); return res.json(); })
    .then(function(data) {
      console.log('[Catalog] MiniTerminal.create(): +' + (performance.now() - _t0).toFixed(0) + 'ms');
      btn.disabled = false;
      ta.disabled = false;
      ta.value = '';
      ta.style.height = 'auto';
      saveDraft(appKey, '');
      if (data.url) {
        if (newTabFlag) {
          try { var u = new URL(data.url); window.open(u.pathname + u.hash, '_blank'); }
          catch(e2) { window.open(data.url, '_blank'); }
        } else {
          var wrap = card.querySelector('.skill-inline-wrap');
          // Dispose existing inline terminal if any
          wrap.innerHTML = '';
          var handle = MiniTerminal.create(wrap, data.id, data.url);
          inlineTerminals[appKey] = handle;
          localStorage.setItem('wsh-inline:' + appKey, JSON.stringify({ id: data.id, url: data.url }));
          // Keep focus on the skill input (desktop only — avoid keyboard popup on touch)
          if (!document.documentElement.classList.contains('touch')) ta.focus();
        }
      }
      else if (data.error) showError(data.error);
    })
    .catch(function(err) {
      btn.disabled = false;
      ta.disabled = false;
      showError('Failed to launch: ' + err.message);
    });
  });
})();
</script>

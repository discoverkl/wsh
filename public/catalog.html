<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e1e2e'/><text x='4' y='24' font-family='monospace' font-size='18' font-weight='bold' fill='%23a6e3a1'>&#x3e;_</text></svg>" />
<script type="module" src="mini-terminal.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page: #1a1a22;
  --bg-card: #242430;
  --bg-card-hover: #2c2c3a;
  --border: #333342;
  --border-hover: #44445a;
  --text-primary: #ededf2;
  --text-secondary: #9c9cb2;
  --text-tertiary: #6a6a80;
  --accent: #6366f1;
  --icon-bg: #2e2e3e;
  --icon-color: #a8a8be;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-page);
  background-image: radial-gradient(ellipse at 50% 0%, #22222e 0%, var(--bg-page) 70%);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 24px;
}

header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px 0;
}

.header-left {
  flex-shrink: 0;
}

.wordmark {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  margin-top: 2px;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
}

.header-right {
  flex-shrink: 0;
  text-align: right;
}

.header-counts {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.header-counts:empty {
  display: none;
}
.hidden-toggle {
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--text-tertiary);
  text-underline-offset: 3px;
  transition: color 0.2s, text-decoration-color 0.2s;
}
.hidden-toggle:hover {
  color: var(--text-secondary);
  text-decoration-color: var(--text-secondary);
}

.header-sessions {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-top: 2px;
}

.header-sessions:empty {
  display: none;
}

.header-sessions .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  margin-right: 4px;
  vertical-align: middle;
  animation: pulse-dot 2s ease-in-out infinite;
}

.search-wrapper {
  position: relative;
  flex: 1;
  max-width: 400px;
}

.search-wrapper svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-tertiary);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-primary);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-input::placeholder {
  color: var(--text-tertiary);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}

.card.hidden-app,
.skill-card.hidden-app {
  opacity: 0.55;
  border-style: dashed;
}

.card.hidden-app:hover,
.skill-card.hidden-app:hover {
  opacity: 0.85;
}

.hidden-badge, .top-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  vertical-align: middle;
}
.hidden-badge {
  color: var(--text-tertiary);
  background: rgba(106, 106, 128, 0.12);
  border: 1px solid rgba(106, 106, 128, 0.2);
}
.top-badge {
  color: #f59e0b;
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.25);
}

.unhide-btn {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  vertical-align: middle;
}

.unhide-btn:hover {
  background: rgba(99, 102, 241, 0.12);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding-bottom: 64px;
}
.grid[hidden] { display: none; }

.card {
  display: block;
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(8px);
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, opacity 0.35s ease-out, transform 0.35s ease-out;
}

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  background: var(--bg-card-hover);
}

.card:hover .card-icon {
  box-shadow: 0 0 20px var(--card-glow, rgba(99, 102, 241, 0.15));
}

/* Patch animations — removals, updates */
.card.removing,
.skill-card.removing {
  opacity: 0 !important;
  transform: scale(0.96) translateY(4px) !important;
  transition: opacity 0.35s ease-out, transform 0.35s ease-out !important;
  pointer-events: none;
}

.card.updated,
.skill-card.updated {
  animation: card-flash 0.6s ease-out;
}

.update-label {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: rgba(255,255,255,.88);
  background: linear-gradient(165deg, rgba(50,50,68,.88) 0%, rgba(32,32,46,.92) 100%);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 4px 12px -2px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.06);
  padding: 4px 10px 4px 14px;
  border-radius: 8px;
  pointer-events: none;
  z-index: 10;
  animation: update-label-in .35s cubic-bezier(.16,1,.3,1);
  transition: opacity .6s ease-out, transform .6s ease-out;
}
/* Accent dot */
.update-label::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #818cf8;
}
.update-label.fade-out {
  opacity: 0;
  transform: translateY(4px);
}
@keyframes update-label-in {
  0%   { opacity: 0; transform: translateY(6px) scale(.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes card-flash {
  0%   { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.3); }
  40%  { box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
  100% { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); }
}

.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--icon-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: box-shadow 0.3s;
}

.card-icon svg {
  width: 24px;
  height: 24px;
}

.card-title-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  min-width: 0;
}

.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.card-sessions {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  white-space: nowrap;
  color: var(--text-tertiary);
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
}

.card-sessions.active {
  opacity: 1;
  color: var(--text-secondary);
}

.card-sessions .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.card-desc {
  font-size: 15px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.5;
  min-height: 45px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  margin-top: 14px;
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.card-type-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  color: #3b82f6;
  background: rgba(59, 130, 246, 0.12);
  border: 1px solid rgba(59, 130, 246, 0.2);
  vertical-align: middle;
}

.card-badge-public {
  color: #22c55e;
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.2);
}

/* Config popover */
.config-gear {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, background 0.2s, color 0.2s;
  z-index: 2;
}
.card:hover .config-gear,
.skill-card:hover .config-gear {
  opacity: 1;
}
.config-gear:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-secondary);
}
.config-gear svg {
  width: 16px;
  height: 16px;
}
.config-popover {
  display: none;
  position: absolute;
  top: 42px;
  right: 12px;
  z-index: 10;
  background: var(--bg-card-hover);
  border: 1px solid var(--border-hover);
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 240px;
  max-width: 340px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}
.config-popover.open { display: block; cursor: default; user-select: text; }
.card:has(.config-popover.open), .skill-card:has(.config-popover.open) { z-index: 10; }
.config-row {
  display: flex;
  gap: 8px;
  font-size: 12px;
  line-height: 1.6;
}
.config-row + .config-row { margin-top: 6px; }
.config-label {
  color: var(--text-tertiary);
  flex-shrink: 0;
  min-width: 60px;
  text-align: right;
}
.config-value {
  color: var(--text-secondary);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  word-break: break-all;
}

.config-hide-btn, .config-top-btn {
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  padding: 2px 0;
  transition: color 0.2s;
}
.config-hide-btn:hover { color: #f59e0b; }
.config-top-btn:hover { color: #3b82f6; }

/* Skeleton loading */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.skeleton-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--icon-bg);
  margin-bottom: 16px;
}

.skeleton-line {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--icon-bg) 25%, #252535 50%, var(--icon-bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

.skeleton-line.title { width: 60%; height: 16px; margin-bottom: 10px; }
.skeleton-line.desc { width: 85%; margin-bottom: 6px; }
.skeleton-line.desc2 { width: 65%; }

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Section labels */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  margin-bottom: 16px;
  padding-left: 4px;
}

/* Skills grid — 2 columns on desktop, 1 on mobile */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(500px, 100%), 1fr));
  gap: 16px;
  padding-bottom: 40px;
}

/* Skill card — purple-tinted border, no link behavior */
.skill-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid rgba(167, 139, 250, 0.15);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(8px);
}
.skill-card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s,
              opacity 0.35s ease-out, transform 0.35s ease-out;
}
.skill-card:hover {
  border-color: rgba(167, 139, 250, 0.35);
  box-shadow: 0 0 30px rgba(167, 139, 250, 0.06);
}

/* Project card — blue-purple accent */
.skill-card.project-card { border-color: rgba(124, 154, 239, 0.15); }
.skill-card.project-card:hover { border-color: rgba(124, 154, 239, 0.35); box-shadow: 0 0 30px rgba(124, 154, 239, 0.06); }
.skill-card.project-card .skill-input:focus { border-color: rgba(124, 154, 239, 0.5); box-shadow: 0 0 0 3px rgba(124, 154, 239, 0.08); }
.skill-card.project-card .skill-submit.has-input { color: #7c9aef; }
.skill-card.project-card .skill-submit:hover,
.skill-card.project-card .skill-submit.has-input:hover { background: rgba(124, 154, 239, 0.15); color: #7c9aef; }
.skill-card.project-card:hover .skill-newtab { color: #7c9aef; }
.skill-card.project-card .skill-newtab:hover { background: rgba(124, 154, 239, 0.2); color: #9db8f5; }
.project-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
  color: #7c9aef;
  background: rgba(124, 154, 239, 0.12);
  border: 1px solid rgba(124, 154, 239, 0.2);
  vertical-align: middle;
}
.project-path {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
  opacity: 0.7;
}

/* Skill card header — icon + title + desc */
.skill-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.skill-info { min-width: 0; }
.skill-info .card-title { font-size: 16px; }
.skill-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Inline input form */
.skill-form {
  display: flex;
  flex-direction: column;
}
.skill-input-wrap {
  position: relative;
  display: flex;
  align-items: flex-end;
}
.skill-input {
  flex: 1;
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 40px 10px 14px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  overflow: hidden;
  min-height: 40px;
  max-height: 320px;
  line-height: 1.5;
  field-sizing: content;
}
.skill-input.tip-fading::placeholder { opacity: 0; transition: opacity 0.3s ease; }
.skill-input::placeholder { transition: opacity 0.3s ease; }
.skill-input:focus {
  border-color: rgba(167, 139, 250, 0.5);
  box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.08);
}
.skill-input::placeholder {
  color: var(--text-tertiary);
}
.skill-input::-webkit-scrollbar {
  width: 6px;
}
.skill-input::-webkit-scrollbar-track {
  background: transparent;
}
.skill-input::-webkit-scrollbar-thumb {
  background: var(--border-hover);
  border-radius: 3px;
}
.skill-input::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}
.skill-input {
  scrollbar-width: thin;
  scrollbar-color: var(--border-hover) transparent;
}
.skill-submit {
  position: absolute;
  right: 6px;
  bottom: 6px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 6px;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  padding: 0;
}
.skill-submit.has-input {
  color: #a78bfa;
}
.skill-submit:hover,
.skill-submit.has-input:hover {
  background: rgba(167, 139, 250, 0.15);
  color: #a78bfa;
}
.skill-submit svg {
  width: 16px;
  height: 16px;
}
.skill-newtab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: transparent;
  border: none;
  border-radius: 6px;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  padding: 0;
  vertical-align: middle;
  margin-left: 6px;
  opacity: 0.4;
}
.skill-card:hover .skill-newtab {
  opacity: 1;
  color: #a78bfa;
}
.skill-newtab:hover {
  background: rgba(167, 139, 250, 0.2);
  color: #c4b5fd;
  opacity: 1;
}
.skill-newtab svg {
  width: 16px;
  height: 16px;
}
.skill-form-footer {
  display: flex;
  align-items: center;
  margin-top: 6px;
}
.skill-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity 0.2s;
  user-select: none;
}
.skill-hint kbd {
  display: inline-block;
  padding: 1px 5px;
  font-size: 10px;
  font-family: inherit;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
}
.skill-hint kbd + kbd {
  margin-left: 2px;
}
.skill-input:focus ~ .skill-submit ~ .skill-form-footer .skill-hint,
.skill-card:hover .skill-hint {
  opacity: 1;
}
.skill-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.skill-inline-wrap {
  margin: 12px -24px -20px;
}
.skill-inline-wrap .mt-bar {
  border-left: none;
  border-right: none;
  border-radius: 0;
}
.skill-inline-wrap .mt-bar.collapsed {
  border-radius: 0 0 12px 12px;
}
.skill-inline-wrap .mt-term {
  border-left: none;
  border-right: none;
  border-bottom: none;
  border-radius: 0 0 12px 12px;
}

/* Error / Empty */
.message {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-secondary);
  font-size: 15px;
}

.message.error { color: #ef4444; }


/* ── Narrow layout (≤640px) ── */
html.narrow header { padding: 14px 0; gap: 0; flex-wrap: wrap; }
html.narrow .header-left { flex: 1; }
html.narrow .tagline { display: none; }
html.narrow .header-right { flex-shrink: 0; }
html.narrow .container { padding: 0 16px; }
html.narrow .grid { gap: 12px; }
html.narrow .skills-grid { grid-template-columns: 1fr; margin: 0 -16px; padding: 0 0 24px; gap: 10px; }
html.narrow .skill-card { border-radius: 0; }
html.narrow .skill-inline-wrap .mt-bar { border-radius: 0; }
html.narrow .skill-inline-wrap .mt-bar.collapsed { border-radius: 0; }
html.narrow .skill-inline-wrap .mt-term { border-radius: 0; }
html.narrow .skill-hint { display: none !important; }
html.narrow .wordmark { font-size: 20px; }
html.narrow .card { padding: 14px 16px; overflow: visible; }
html.narrow .card-title { font-size: 14px; }
html.narrow .card-desc { font-size: 12px; -webkit-line-clamp: 1; margin-top: 2px; min-height: 0; }
html.narrow .card-footer { display: none; }
html.narrow .card-icon { width: 36px; height: 36px; border-radius: 8px; }
html.narrow .card-icon svg { width: 18px; height: 18px; }
html.narrow .card-header { gap: 10px; margin-bottom: 4px; }
html.narrow .skill-info .card-title { font-size: 14px; }
html.narrow .skill-desc { font-size: 12px; }
html.narrow .skill-input { font-size: 16px; padding: 10px 44px 10px 14px; }
html.narrow .skill-submit { width: 36px; height: 36px; right: 4px; bottom: 4px; }
html.narrow .skill-submit svg { width: 18px; height: 18px; }
html.narrow .search-input { font-size: 16px; }
html.narrow .section-label { font-size: 10px; }
html.narrow .config-popover { min-width: 0; max-width: none; left: 12px; right: 12px; }
html.narrow .config-gear { display: none; }
html.narrow .unhide-btn { font-size: 13px; padding: 6px 12px; }
html.narrow .search-wrapper {
  order: 3;
  flex-basis: 100%;
  max-width: none;
  margin-top: 10px;
}
html.narrow .search-wrapper svg { left: 12px; }

/* ── Touch interaction ── */
html.touch .config-gear { opacity: 0.5; width: 44px; height: 44px; top: 6px; right: 6px; }
html.touch .card:active { transform: scale(0.98); background: var(--bg-card-hover); transition: none; }
html.touch .skill-card:active { transform: scale(0.99); background: var(--bg-card-hover); transition: none; }
html.touch .skill-submit { width: 44px; height: 44px; right: 2px; bottom: 2px; }
html.touch .skill-newtab { width: 32px; height: 32px; opacity: 0.7; }
html.touch .skill-newtab svg { width: 16px; height: 16px; }

/* ── Swipe cards base (always present, actions hidden until narrow+touch) ── */
.card-swipe-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
}
.card-swipe-wrap > .card {
  flex: 1;
}
.card-actions {
  display: none;
}

/* ── Narrow + Touch: swipe cards ── */
html.narrow.touch .card-swipe-wrap {
  overflow: hidden;
  border-radius: 12px;
}
html.narrow.touch .card-swipe-wrap .card {
  position: relative;
  z-index: 1;
  transition: transform 0.25s ease;
  border-radius: 12px;
}
html.narrow.touch .card-actions {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: stretch;
  z-index: 0;
}
html.narrow.touch .card-action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  border: none;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  flex-direction: column;
  gap: 4px;
}
html.narrow.touch .card-action-btn svg { width: 18px; height: 18px; }
html.narrow.touch .card-action-btn.action-info { background: #333342; color: var(--text-secondary); }
html.narrow.touch .card-action-btn.action-hide { background: #332b1a; color: #f59e0b; }
</style>
</head>
<body>
<script src="viewport.js"></script>
<div class="container">
  <header>
    <div class="header-left">
      <div class="wordmark">{{title}}</div>
      <div class="tagline">{{tagline}}</div>
    </div>
    <div class="search-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="catalog-search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    </div>
    <div class="header-right">
      <div class="header-counts" id="header-counts"></div>
      <div class="header-sessions" id="header-sessions"></div>
    </div>
  </header>
  <div id="skills-section" hidden>
    <div class="section-label">Skills & Projects</div>
    <div id="skills-content" class="skills-grid"></div>
  </div>
  <div id="apps-section" hidden>
    <div class="section-label">Apps</div>
    <div id="apps-content" class="grid"></div>
  </div>
  <div id="search-empty" class="message" hidden>No results</div>
  <div id="loading-content" class="grid">
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
    <div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-line title"></div><div class="skeleton-line desc"></div><div class="skeleton-line desc2"></div></div>
  </div>
</div>
<script src="icons.js"></script>
<script type="module">
import './api.js';
import { connectRpc } from './wsh-rpc.js';
import { wrapCard as swipeWrapCard, init as swipeInit } from './swipe-cards.js';

(function() {
  // Track active inline terminals per app key
  var inlineTerminals = {};

  // Use shared icon registry from icons.js
  var iconColors = window.wshIconColors;
  var icons = window.wshIcons;
  var iconAliases = window.wshIconAliases;

  // Auto-generated descriptions for well-known apps
  var defaultDescriptions = {
    bash: 'Bourne Again Shell',
    zsh: 'Z Shell',
    sh: 'POSIX Shell',
    fish: 'Friendly Interactive Shell',
    python: 'Python REPL',
    python3: 'Python 3 REPL',
    node: 'Node.js REPL',
    nodejs: 'Node.js REPL',
    vim: 'Vi IMproved text editor',
    nvim: 'Neovim text editor',
    neovim: 'Neovim text editor',
    htop: 'Interactive process viewer',
    btop: 'Resource monitor',
    top: 'Process monitor',
    docker: 'Container runtime',
    git: 'Version control',
    ruby: 'Ruby REPL',
    irb: 'Interactive Ruby',
    claude: 'AI coding assistant',
    chatgpt: 'AI assistant',
    ollama: 'Local AI models',
    aider: 'AI pair programming',
    mysql: 'MySQL client',
    psql: 'PostgreSQL client',
    'redis-cli': 'Redis client',
    sqlite3: 'SQLite console',
    ssh: 'Secure Shell',
    curl: 'HTTP client',
    wget: 'File downloader'
  };

  function resolveIconId(app) {
    if (app.icon && icons[app.icon]) return app.icon;
    if (iconAliases[app.key]) return iconAliases[app.key];
    var basename = app.command.split('/').pop();
    if (iconAliases[basename]) return iconAliases[basename];
    return 'default';
  }

  function resolveDescription(app) {
    if (app.description) return app.description;
    if (defaultDescriptions[app.key]) return defaultDescriptions[app.key];
    var basename = app.command.split('/').pop();
    if (defaultDescriptions[basename]) return defaultDescriptions[basename];
    if (app.skill) return 'Skill';
    if (app.type === 'web') return 'Web app';
    return 'Terminal app';
  }

  function buildSkillCard(app, isHidden) {
    var iconId = resolveIconId(app);
    var color = iconColors[iconId] || iconColors.default;
    var div = document.createElement('div');
    var isTopped = !isHidden && !!app.top;
    div.className = 'skill-card' + (app.slashPrefix === false ? ' project-card' : '') + (isHidden ? ' hidden-app' : '') + (isTopped ? ' topped-app' : '');
    if (isHidden) div.style.display = 'none';
    div.dataset.app = app.key;
    div.dataset.title = app.title;
    div.dataset.desc = resolveDescription(app);
    if (app.slashPrefix === false) div.dataset.slashPrefix = '0';
    if (isHidden) div.dataset.hidden = '1';
    if (isTopped) div.dataset.top = '1';
    var isProject = app.slashPrefix === false;
    var tips = app.tips && app.tips.length ? app.tips : null;
    var startIdx = tips ? Math.floor(Math.random() * tips.length) : 0;
    var placeholder = tips ? tips[startIdx] : (isProject ? 'What would you like to do?' : 'Describe your task...');
    var badges = isHidden
      ? '<span class="hidden-badge">Hidden</span> <button class="unhide-btn" data-unhide="' + escapeAttr(app.key) + '">Unhide</button>'
      : (isProject ? '<span class="project-badge">Project</span>' + (isTopped ? ' <span class="top-badge">Top</span>' : '') : (isTopped ? '<span class="top-badge">Top</span>' : ''));
    div.innerHTML =
      buildConfigPopover(app) +
      '<div class="skill-header">' +
        '<div class="card-icon" style="color:' + (app.slashPrefix === false ? '#7c9aef' : '#a78bfa') + '">' + icons[iconId] + '</div>' +
        '<div class="skill-info">' +
          '<span class="card-title">' + escapeHtml(app.title) + '</span> ' +
          '<button type="button" class="skill-newtab" tabindex="-1" title="Open in new tab" data-app="' + escapeAttr(app.key) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>' + badges +
          '<div class="skill-desc" title="' + escapeAttr(resolveDescription(app)) + '">' + linkify(resolveDescription(app)) + '</div>' +
          (isProject && app.cwd ? '<div class="project-path" title="' + escapeAttr(app.cwd) + '">' + escapeHtml(app.cwd.replace(/^\/root\//, '~/')) + '</div>' : '') +
        '</div>' +
        '<span class="card-sessions" data-app="' + escapeAttr(app.key) + '"></span>' +
      '</div>' +
      '<form class="skill-form" data-app="' + escapeAttr(app.key) + '">' +
        '<div class="skill-input-wrap">' +
          '<textarea class="skill-input" rows="1"' +
            (tips ? ' data-tips="' + escapeAttr(JSON.stringify(tips)) + '" data-tip-idx="' + startIdx + '"' : '') +
            ' placeholder="' + escapeAttr(placeholder) + '"></textarea>' +
          '<button type="submit" class="skill-submit" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>' +
        '</div>' +
        '<div class="skill-form-footer">' +
          '<span class="skill-hint">' + (tips ? '<kbd>Tab</kbd> try · ' : '') + '<kbd>Enter</kbd> run · <kbd>Esc</kbd> send Esc</span>' +
        '</div>' +
      '</form>' +
      '<div class="skill-inline-wrap"></div>';
    return div;
  }

  var tipCycleTimer = null;

  function stopTipCycling() {
    if (tipCycleTimer) { clearInterval(tipCycleTimer); tipCycleTimer = null; }
  }

  function startTipCycling(container) {
    stopTipCycling();
    var textareas = Array.from(container.querySelectorAll('textarea.skill-input[data-tips]')).filter(function(ta) {
      try { return JSON.parse(ta.dataset.tips).length >= 2; } catch(e) { return false; }
    });
    if (!textareas.length) return;
    tipCycleTimer = setInterval(function() {
      textareas.forEach(function(ta) {
        if (ta.value !== '' || document.activeElement === ta) return;
        var tips = JSON.parse(ta.dataset.tips);
        var curIdx = parseInt(ta.dataset.tipIdx, 10) || 0;
        var tipIdx = (curIdx + 1 + Math.floor(Math.random() * (tips.length - 1))) % tips.length;
        ta.classList.add('tip-fading');
        setTimeout(function() {
          ta.dataset.tipIdx = tipIdx;
          ta.placeholder = tips[tipIdx];
          ta.classList.remove('tip-fading');
        }, 300);
      });
    }, 18000);
  }

  function renderSkills(skills, hiddenSkills) {
    var section = document.getElementById('skills-section');
    var content = document.getElementById('skills-content');
    stopTipCycling();
    content.innerHTML = '';
    skills.forEach(function(app, i) {
      var div = buildSkillCard(app, false);
      content.appendChild(div);
      setTimeout(function() { div.classList.add('visible'); }, 30 * i);
    });
    (hiddenSkills || []).forEach(function(app, i) {
      var div = buildSkillCard(app, true);
      content.appendChild(div);
      setTimeout(function() { div.classList.add('visible'); }, 30 * (skills.length + i));
    });
    section.hidden = false;
    startTipCycling(content);
  }

  function buildAppCard(app, isHidden) {
    var iconId = resolveIconId(app);
    var color = iconColors[iconId] || iconColors.default;
    var a = document.createElement('a');
    a.href = './' + app.key;
    var isTopped = !isHidden && !!app.top;
    a.className = 'card' + (isHidden ? ' hidden-app' : '') + (isTopped ? ' topped-app' : '');
    a.target = '_blank';
    a.dataset.app = app.key;
    a.dataset.title = app.title;
    a.dataset.desc = resolveDescription(app);
    if (isHidden) a.dataset.hidden = '1';
    if (isTopped) a.dataset.top = '1';
    var r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
    a.style.setProperty('--card-glow', 'rgba(' + r + ',' + g + ',' + b + ',0.2)');
    var badges = isHidden
      ? '<span class="hidden-badge">Hidden</span> <button class="unhide-btn" data-unhide="' + escapeAttr(app.key) + '" onclick="event.preventDefault()">Unhide</button>'
      : (isTopped ? '<span class="top-badge">Top</span>' : '');
    a.innerHTML =
      buildConfigPopover(app) +
      '<div class="card-header">' +
        '<div class="card-icon" style="color:' + color + '">' + icons[iconId] + '</div>' +
        '<div class="card-title-row">' +
          '<span class="card-title">' + escapeHtml(app.title) + '</span>' +
          (app.type === 'web' ? '<span class="card-type-badge">WEB</span>' : '') +
          (app.access === 'public' ? '<span class="card-type-badge card-badge-public">PUBLIC</span>' : '') +
          badges +
          '<span class="card-sessions" data-app="' + escapeAttr(app.key) + '"></span>' +
        '</div>' +
      '</div>' +
      '<div class="card-desc" title="' + escapeAttr(resolveDescription(app)) + '">' + linkify(resolveDescription(app)) + '</div>' +
      '<div class="card-footer">' + escapeHtml(app.key) + '</div>';
    return a;
  }

  var d = document.documentElement;

  function renderApps(apps, hiddenApps) {
    var content = document.getElementById('apps-content');
    content.innerHTML = '';
    apps.forEach(function(app, i) {
      var a = buildAppCard(app, false);
      var el = swipeWrapCard(a, app, escapeAttr);
      content.appendChild(el);
      setTimeout(function() { a.classList.add('visible'); }, 30 * i);
    });
    (hiddenApps || []).forEach(function(app, i) {
      var a = buildAppCard(app, true);
      var el = swipeWrapCard(a, app, escapeAttr);
      content.appendChild(el);
      setTimeout(function() { a.classList.add('visible'); }, 30 * (apps.length + i));
    });
    swipeInit();
    document.getElementById('apps-section').hidden = false;
  }

  function renderCards(allApps) {
    document.getElementById('loading-content').hidden = true;
    if (allApps.length === 0) {
      var appsSection = document.getElementById('apps-section');
      appsSection.hidden = false;
      document.getElementById('apps-content').innerHTML = '<div class="message">No apps configured</div>';
      appsSection.querySelector('.section-label').style.display = 'none';
      return;
    }
    var visibleApps = allApps.filter(function(a) { return !a.hidden; });
    var hiddenApps = allApps.filter(function(a) { return !!a.hidden; });
    var skills = visibleApps.filter(function(a) { return !!a.skill; });
    var apps = visibleApps.filter(function(a) { return !a.skill; });
    var hiddenSkills = hiddenApps.filter(function(a) { return !!a.skill; });
    var hiddenNonSkills = hiddenApps.filter(function(a) { return !a.skill; });
    if (skills.length || hiddenSkills.length) {
      renderSkills(skills, hiddenSkills); restoreDrafts(); reconnectInline();
    }
    if (apps.length || hiddenNonSkills.length) renderApps(apps, hiddenNonSkills);

    // Update header counts
    var countsEl = document.getElementById('header-counts');
    if (countsEl) {
      var parts = [];
      if (apps.length) parts.push(apps.length + (apps.length === 1 ? ' app' : ' apps'));
      if (skills.length) parts.push(skills.length + (skills.length === 1 ? ' skill' : ' skills'));
      countsEl.innerHTML = parts.join(' \u00b7 ');
      var hiddenTotal = (hiddenApps || []).length;
      if (hiddenTotal) {
        countsEl.insertAdjacentHTML('beforeend',
          ' \u00b7 <span class="hidden-toggle" id="hidden-toggle">' + hiddenTotal + ' hidden</span>');
      }
    }

    // Hide section labels when only one type exists
    if (!skills.length) {
      var label = document.querySelector('#apps-section .section-label');
      if (label) label.style.display = 'none';
    }

    // Focus search bar
    var searchInput = document.getElementById('catalog-search');
    if (searchInput && !document.documentElement.classList.contains('narrow') && !document.documentElement.classList.contains('touch')) searchInput.focus();

    // Wire up search filtering
    initSearch(allApps);

    // Async: fetch active sessions and update badges
    fetchSessions();
  }

  function initSearch(allApps) {
    var input = document.getElementById('catalog-search');
    if (!input) return;

    function filterCards(selector) {
      var q = input.value.toLowerCase().trim();
      var cards = document.querySelectorAll(selector);
      var visible = 0;
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        // On mobile, app cards are wrapped — check the wrap for hidden/data attrs
        var wrap = card.closest('.card-swipe-wrap');
        var target = wrap || card;
        var isHidden = target.dataset.hidden === '1';
        var title = (target.getAttribute('data-title') || card.getAttribute('data-title') || '').toLowerCase();
        var desc = (target.getAttribute('data-desc') || card.getAttribute('data-desc') || '').toLowerCase();
        var appKey = (target.getAttribute('data-app') || card.getAttribute('data-app') || '').toLowerCase();
        var matchesQuery = title.indexOf(q) !== -1 || desc.indexOf(q) !== -1 || appKey.indexOf(q) !== -1;
        var show = isHidden ? ((showingHidden || q) && matchesQuery) : (!q || matchesQuery);
        target.style.display = show ? '' : 'none';
        if (show) visible++;
      }
      return visible;
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && input.value) {
        e.preventDefault();
        e.stopPropagation();
        input.value = '';
        input.dispatchEvent(new Event('input'));
      }
    });

    input.addEventListener('input', function() {
      var skillsVisible = filterCards('#skills-content .skill-card');
      var appsVisible = filterCards('#apps-content .card');
      var skillsSection = document.getElementById('skills-section');
      var appsSection = document.getElementById('apps-section');
      if (skillsSection && !skillsSection.hidden) {
        skillsSection.style.display = skillsVisible ? '' : 'none';
      }
      if (appsSection && !appsSection.hidden) {
        appsSection.style.display = appsVisible ? '' : 'none';
      }
      var emptyEl = document.getElementById('search-empty');
      if (emptyEl) {
        var q = input.value.trim();
        emptyEl.hidden = !q || skillsVisible || appsVisible;
      }
    });

    // Wire up unhide buttons
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.unhide-btn');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      var appKey = btn.getAttribute('data-unhide');
      btn.textContent = '...';
      fetch('./api/apps/' + encodeURIComponent(appKey) + '/unhide', { method: 'POST' })
        .then(function(res) { return res.json(); })
        .then(function() {
          var card = btn.closest('.card, .skill-card');
          if (card) unhideCard(card);
        })
        .catch(function() { btn.textContent = 'Unhide'; });
    });
  }

  // ── Centralized hide/unhide ──────────────────────────────
  // Every code path that hides or unhides a card MUST go through these two
  // functions.  They own all DOM mutations, badge injection, and header updates.

  function hideCard(card, appKey) {
    var target = card.closest('.card-swipe-wrap') || card;
    card.classList.add('hidden-app');
    card.dataset.hidden = '1';
    if (target !== card) target.dataset.hidden = '1';
    if (!card.querySelector('.hidden-badge')) {
      var titleEl = card.querySelector('.card-title');
      if (titleEl) {
        var onclickAttr = card.tagName === 'A' ? ' onclick="event.preventDefault()"' : '';
        titleEl.insertAdjacentHTML('afterend',
          ' <span class="hidden-badge">Hidden</span> <button class="unhide-btn" data-unhide="' + escapeAttr(appKey) + '"' + onclickAttr + '>Unhide</button>');
      }
    }
    card.classList.add('removing');
    setTimeout(function() {
      target.style.display = 'none';
      card.classList.remove('removing');
    }, 350);
    updateCounts();
  }

  function unhideCard(card) {
    var target = card.closest('.card-swipe-wrap') || card;
    card.classList.remove('hidden-app');
    card.style.borderStyle = '';
    delete card.dataset.hidden;
    if (target !== card) delete target.dataset.hidden;
    var badge = card.querySelector('.hidden-badge');
    if (badge) badge.remove();
    var btn = card.querySelector('.unhide-btn');
    if (btn) btn.remove();
    card.classList.remove('visible');
    target.style.display = '';
    requestAnimationFrame(function() { card.classList.add('visible'); });
    updateCounts();
  }

  function updateCounts() {
    // 1) Update hidden toggle
    var toggle = document.getElementById('hidden-toggle');
    var remaining = document.querySelectorAll('.skill-card[data-hidden="1"], .card-swipe-wrap[data-hidden="1"]').length;
    if (toggle) {
      if (remaining) {
        toggle.textContent = remaining + ' hidden' + (showingHidden ? ' \u2715' : '');
      } else {
        toggle.remove();
        showingHidden = false;
      }
    } else if (remaining) {
      var countsEl = document.getElementById('header-counts');
      if (countsEl) {
        countsEl.insertAdjacentHTML('beforeend',
          ' \u00b7 <span class="hidden-toggle" id="hidden-toggle">' + remaining + ' hidden</span>');
      }
    }
    // 2) Update apps/skills counts
    var countsEl = document.getElementById('header-counts');
    if (!countsEl) return;
    var appsCount = document.querySelectorAll('#apps-content > .card-swipe-wrap:not([data-hidden="1"])').length;
    var skillsCount = document.querySelectorAll('#skills-content > .skill-card:not([data-hidden="1"])').length;
    var parts = [];
    if (appsCount) parts.push(appsCount + (appsCount === 1 ? ' app' : ' apps'));
    if (skillsCount) parts.push(skillsCount + (skillsCount === 1 ? ' skill' : ' skills'));
    toggle = document.getElementById('hidden-toggle');
    countsEl.innerHTML = parts.join(' \u00b7 ');
    if (toggle) {
      countsEl.appendChild(document.createTextNode(' \u00b7 '));
      countsEl.appendChild(toggle);
    }
    // 3) Show/hide sections based on visible card count
    if (!showingHidden) {
      var ss = document.getElementById('skills-section');
      var as = document.getElementById('apps-section');
      if (ss && !ss.hidden) ss.style.display = skillsCount ? '' : 'none';
      if (as && !as.hidden) as.style.display = appsCount ? '' : 'none';

  /** Find the single-app difference between old and new lists.
   *  Returns { type, key, app } or null if >1 app changed. */
  function diffApps(oldApps, newApps) {
    var oldByKey = {};
    oldApps.forEach(function(a) { oldByKey[a.key] = a; });
    var newByKey = {};
    newApps.forEach(function(a) { newByKey[a.key] = a; });

    var changes = [];

    // Added or changed
    newApps.forEach(function(a) {
      var old = oldByKey[a.key];
      if (!old) { changes.push({ type: 'added', key: a.key, app: a }); }
      else if (old.hidden && !a.hidden) { changes.push({ type: 'unhide', key: a.key, app: a }); }
      else if (!old.hidden && a.hidden) { changes.push({ type: 'hide', key: a.key, app: a }); }
      else {
        var fields = [];
        if (old.title !== a.title) fields.push('title');
        if (old.description !== a.description) fields.push('description');
        if (old.icon !== a.icon) fields.push('icon');
        if (old.command !== a.command) fields.push('command');
        if (old.skill !== a.skill) fields.push('skill');
        if (old.type !== a.type) fields.push('type');
        if (old.access !== a.access) fields.push('access');
        if (old.top !== a.top) fields.push('top');
        if (fields.length) changes.push({ type: 'updated', key: a.key, app: a, fields: fields });
      }
    });
    // Removed
    oldApps.forEach(function(a) {
      if (!newByKey[a.key]) changes.push({ type: 'removed', key: a.key, app: a });
    });

    if (changes.length === 0) {
      // Check order changed
      if (oldApps.length !== newApps.length) return null;
      for (var i = 0; i < oldApps.length; i++) {
        if (oldApps[i].key !== newApps[i].key) return null;
      }
      return 'none';
    }
    return changes.length === 1 ? changes[0] : null;
  }

    target.style.position = 'fixed';
    target.style.left = rect.left + 'px';
    target.style.top = rect.top + 'px';
    target.style.width = rect.width + 'px';
    target.style.height = rect.height + 'px';
    target.style.margin = '0';
    target.style.zIndex = '0';
    document.body.appendChild(target);
    card.classList.add('removing');
    function cleanup() { if (target.parentNode) target.remove(); }
    card.addEventListener('transitionend', function handler() {
      card.removeEventListener('transitionend', handler);
      cleanup();

      document.getElementById('skills-section').hidden = false;

  window.refreshCatalog = function refreshCatalog() {
    return fetch('./api/apps')
      .then(function(res) {
        if (res.status === 401) throw new Error('Authentication required');
        if (!res.ok) throw new Error('Failed to load apps (HTTP ' + res.status + ')');
        return res.json();
      })
      .then(function(data) {
        var apps = data.apps || [];

        // Show config warnings once per session
        if (data.warnings && data.warnings.length) {
          var warnKey = 'wsh_config_warnings_' + JSON.stringify(data.warnings);
          var warnTs = parseInt(localStorage.getItem(warnKey) || '0', 10);
          if (!warnTs || Date.now() - warnTs > 86400000) {
            localStorage.setItem(warnKey, String(Date.now()));
            data.warnings.forEach(function(w) { api.toast({ html: w, variant: 'warn', duration: 10000 }); });
          }
        }

        // Initial load — full render
        if (!lastApps) {
          lastApps = apps;
          renderCards(apps);
          return;
        }

        // Diff against previous
        var diff = diffApps(lastApps, apps);
        lastApps = apps;

        // No changes — just refresh session badges
        if (diff === 'none') {
          fetchSessions();
          return;
        }
        // Multiple changes — full re-render
        if (!diff) {
          renderCards(apps);
          return;
        }

        var card = findCard(diff.key);

        if (diff.type === 'removed') {
          if (card && !inlineTerminals[diff.key]) animateRemove(card);

        } else if (diff.type === 'added') {
          animateAdd(diff.app);

        } else if (diff.type === 'hide') {
          if (card) hideCard(card, diff.key);
          else updateCounts();

        } else if (diff.type === 'unhide') {
          if (card) unhideCard(card);
          else updateCounts();

        } else if (diff.type === 'updated') {
          if (card && !inlineTerminals[diff.key]) {
            // Replace the card entirely and flash it
            var container = card.closest('#skills-content, #apps-content');
            var newCard;
            if (diff.app.skill) {
              newCard = buildSkillCard(diff.app, !!diff.app.hidden);
            } else {
              newCard = buildAppCard(diff.app, !!diff.app.hidden);
              newCard = swipeWrapCard(newCard, diff.app, escapeAttr);
            }
            var target = card.closest('.card-swipe-wrap') || card;
            container.replaceChild(newCard, target);
            var animTarget = newCard.classList.contains('card') || newCard.classList.contains('skill-card')
              ? newCard : newCard.querySelector('.card, .skill-card') || newCard;
            animTarget.classList.add('visible', 'updated');
            // Show a brief label indicating what changed
            if (diff.fields && diff.fields.length) {
              var label = document.createElement('div');
              label.className = 'update-label';
              label.textContent = diff.fields.join(', ') + ' updated';
              animTarget.style.position = 'relative';
              animTarget.appendChild(label);
              setTimeout(function() { label.classList.add('fade-out'); }, 1500);
              setTimeout(function() { if (label.parentNode) label.remove(); }, 2500);
            }
            if (!diff.app.skill) swipeInit();
          }

      })
      .catch(function(err) {

      });

    ta.disabled = true;

    fetch('./api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: appKey, input: input, mode: newTabFlag ? '' : 'inline' })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      btn.disabled = false;
      ta.disabled = false;
      ta.value = '';
      ta.style.height = 'auto';
      saveDraft(appKey, '');
      if (data.url) {
        if (newTabFlag) {
          try { var u = new URL(data.url); window.open(u.pathname + u.hash, '_blank'); }
          catch(e2) { window.open(data.url, '_blank'); }
        } else {
          var wrap = card.querySelector('.skill-inline-wrap');
          // Dispose existing inline terminal if any
          wrap.innerHTML = '';
          var handle = MiniTerminal.create(wrap, data.id, data.url);
          inlineTerminals[appKey] = handle;
          localStorage.setItem('wsh-inline:' + appKey, JSON.stringify({ id: data.id, url: data.url }));
          // Keep focus on the skill input (desktop only — avoid keyboard popup on touch)
          if (!document.documentElement.classList.contains('touch')) ta.focus();
        }
      }
      else if (data.error) showError(data.error);
    })
    .catch(function(err) {
      btn.disabled = false;
      ta.disabled = false;
      showError('Failed to launch: ' + err.message);
    });
  });
})();
</script>
</body>
</html>
